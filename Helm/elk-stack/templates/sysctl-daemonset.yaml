# ---------------------------------------------------------------------------
# DaemonSet — sets vm.max_map_count=262144 on every GKE node.
#
# Runs in kube-system to avoid PodSecurityAdmission enforcement on the
# application namespace. The privileged container exits immediately after
# setting the sysctl; the pause container keeps the DaemonSet pod alive
# so Kubernetes does not restart-loop it.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "elk-stack.fullname" . }}-sysctl
  namespace: kube-system
  labels:
    {{- include "elk-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: sysctl-tuner
spec:
  selector:
    matchLabels:
      {{- include "elk-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sysctl-tuner
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "elk-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sysctl-tuner
    spec:
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      initContainers:
        - name: sysctl
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            runAsUser: 0
          command:
            - sysctl
            - -w
            - vm.max_map_count=262144
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: pause
          image: gcr.io/google_containers/pause:3.9
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 8Mi
