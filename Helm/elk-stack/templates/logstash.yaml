{{- if .Values.logstash.enabled -}}
# ---------------------------------------------------------------------------
# Logstash — Pipeline ConfigMap
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elk-stack.logstash.fullname" . }}-pipeline
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "elk-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: logstash
data:
  logstash.conf: |
    input {
      {{ tpl .Values.logstash.pipeline.input . | nindent 6 | trim }}
    }
    filter {
      {{ tpl .Values.logstash.pipeline.filter . | nindent 6 | trim }}
    }
    output {
      {{ tpl .Values.logstash.pipeline.output . | nindent 6 | trim }}
    }
---
# ---------------------------------------------------------------------------
# Logstash — Service
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: {{ include "elk-stack.logstash.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "elk-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: logstash
spec:
  type: {{ .Values.logstash.service.type }}
  ports:
    - name: beats
      port: {{ .Values.logstash.service.beatsPort }}
      targetPort: beats
    - name: http
      port: {{ .Values.logstash.service.httpPort }}
      targetPort: http
  selector:
    {{- include "elk-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: logstash
---
# ---------------------------------------------------------------------------
# Logstash — Deployment
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elk-stack.logstash.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "elk-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: logstash
spec:
  replicas: {{ .Values.logstash.replicas }}
  selector:
    matchLabels:
      {{- include "elk-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: logstash
  template:
    metadata:
      labels:
        {{- include "elk-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: logstash
      annotations:
        # Force pod restart when pipeline ConfigMap changes
        checksum/config: {{ toYaml .Values.logstash.pipeline | sha256sum }}
    spec:
      serviceAccountName: {{ include "elk-stack.serviceAccountName" . }}
      nodeSelector:
        cloud.google.com/gke-nodepool: generic
      tolerations:
        - key: "apptype"
          value: "generic"
          effect: "NoSchedule"
          operator: "Equal"
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: logstash
          image: "{{ .Values.logstash.image.repository }}:{{ .Values.logstash.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: beats
              containerPort: {{ .Values.logstash.service.beatsPort }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.logstash.service.httpPort }}
              protocol: TCP
          env:
            - name: LS_JAVA_OPTS
              value: {{ .Values.logstash.javaOpts | quote }}
            {{- with .Values.logstash.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.logstash.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline
      volumes:
        - name: pipeline
          configMap:
            name: {{ include "elk-stack.logstash.fullname" . }}-pipeline
{{- end }}
