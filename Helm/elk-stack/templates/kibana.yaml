{{- if .Values.kibana.enabled -}}
# ---------------------------------------------------------------------------
# Kibana — Service
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: {{ include "elk-stack.kibana.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "elk-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
spec:
  type: {{ .Values.kibana.service.type }}
  ports:
    - name: http
      port: {{ .Values.kibana.service.port }}
      targetPort: http
  selector:
    {{- include "elk-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
---
# ---------------------------------------------------------------------------
# Kibana — Deployment
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elk-stack.kibana.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "elk-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
spec:
  replicas: {{ .Values.kibana.replicas }}
  selector:
    matchLabels:
      {{- include "elk-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kibana
  template:
    metadata:
      labels:
        {{- include "elk-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kibana
    spec:
      serviceAccountName: {{ include "elk-stack.serviceAccountName" . }}
      nodeSelector:
        cloud.google.com/gke-nodepool: generic
      tolerations:
        - key: "apptype"
          value: "generic"
          effect: "NoSchedule"
          operator: "Equal"
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kibana
          image: "{{ .Values.kibana.image.repository }}:{{ .Values.kibana.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.kibana.service.port }}
              protocol: TCP
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://{{ include "elk-stack.elasticsearch.fullname" . }}:{{ .Values.elasticsearch.service.httpPort }}"
            - name: SERVER_NAME
              value: {{ include "elk-stack.kibana.fullname" . }}
            {{- with .Values.kibana.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.kibana.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 120   # readiness (was 45)
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 180   # liveness  (was 90)
            failureThreshold: 10       # was 5 — more breathing room
---
# ---------------------------------------------------------------------------
# Kibana — Ingress (optional, GKE-ready)
# ---------------------------------------------------------------------------
{{- if .Values.kibana.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "elk-stack.kibana.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "elk-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
  {{- with .Values.kibana.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.kibana.ingress.className }}
  ingressClassName: {{ .Values.kibana.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.kibana.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "elk-stack.kibana.fullname" . }}
                port:
                  number: {{ .Values.kibana.service.port }}
  {{- with .Values.kibana.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
